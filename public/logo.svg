<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgR" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFCE8"/>
      <stop offset="8%"   stop-color="#FAE070"/>
      <stop offset="28%"  stop-color="#C07C00"/>
      <stop offset="50%"  stop-color="#EDAE1A"/>
      <stop offset="74%"  stop-color="#904E00"/>
      <stop offset="100%" stop-color="#3C1800"/>
    </linearGradient>
    <linearGradient id="gPot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFF6B0"/>
      <stop offset="28%"  stop-color="#DEAD2A"/>
      <stop offset="62%"  stop-color="#7E4E00"/>
      <stop offset="100%" stop-color="#3C2000"/>
    </linearGradient>
    <linearGradient id="gSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gSteam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#C88800" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C88800" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFF6B0"/>
      <stop offset="22%"  stop-color="#7A5200"/>
      <stop offset="50%"  stop-color="#FFF6B0"/>
      <stop offset="78%"  stop-color="#7A5200"/>
      <stop offset="100%" stop-color="#FFF6B0"/>
    </linearGradient>
    <linearGradient id="gBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#9A6200" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#D4A020"/>
      <stop offset="50%"  stop-color="#FFF6B0"/>
      <stop offset="82%"  stop-color="#D4A020"/>
      <stop offset="100%" stop-color="#9A6200" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gAcc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFF6B0"/>
      <stop offset="50%"  stop-color="#C88800"/>
      <stop offset="100%" stop-color="#5A3200"/>
    </linearGradient>
  </defs>

  <!-- Outer black plate -->
  <circle cx="340" cy="340" r="316" fill="#000"/>
  <!-- Main circle bg -->
  <circle cx="340" cy="340" r="296" fill="url(#bgR)"/>
  <!-- Gold rings -->
  <circle cx="340" cy="340" r="296" fill="none" stroke="url(#gRing)" stroke-width="10"/>
  <circle cx="340" cy="340" r="284" fill="none" stroke="#B07800" stroke-width="0.8" opacity="0.4"/>

  <!-- Steam -->
  <path d="M318 108 C311 90 322 76 314 58"  fill="none" stroke="url(#gSteam)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M340 102 C333 82 344 66 336 46"  fill="none" stroke="url(#gSteam)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M362 108 C369 90 358 76 366 58"  fill="none" stroke="url(#gSteam)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Lid knob -->
  <ellipse cx="340" cy="136" rx="12" ry="7" fill="url(#gPot)"/>
  <ellipse cx="337" cy="134" rx="5" ry="3"  fill="url(#gSheen)"/>

  <!-- Lid -->
  <path d="M290 148 Q340 130 390 148 L386 162 Q340 146 294 162 Z" fill="url(#gPot)"/>
  <ellipse cx="323" cy="148" rx="24" ry="7" fill="url(#gSheen)"/>

  <!-- Pot body -->
  <rect x="290" y="160" width="100" height="74" rx="13" fill="url(#gPot)"/>
  <ellipse cx="318" cy="180" rx="24" ry="11" fill="url(#gSheen)"/>

  <!-- Handles -->
  <path d="M292 172 Q264 172 264 197 Q264 222 292 222" fill="none" stroke="url(#gPot)" stroke-width="11" stroke-linecap="round"/>
  <path d="M388 172 Q416 172 416 197 Q416 222 388 222" fill="none" stroke="url(#gPot)" stroke-width="11" stroke-linecap="round"/>

  <!-- Side diamonds -->
  <polygon points="244,197 230,210 244,223 258,210" fill="url(#gAcc)"/>
  <polygon points="436,197 422,210 436,223 450,210" fill="url(#gAcc)"/>

  <!-- Top bar -->
  <rect x="90" y="248" width="500" height="6" rx="2.5" fill="url(#gBar)"/>

  <!-- Shadow layers -->
  <text x="343" y="368" text-anchor="middle" dominant-baseline="central"
    font-family="Georgia,'Times New Roman',serif"
    font-size="132" font-weight="700" letter-spacing="1"
    fill="#0A0400" opacity="0.85">indiana</text>
